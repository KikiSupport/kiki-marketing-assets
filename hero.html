<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiki — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{width:1400px;height:900px;}
body{
  width:1400px;height:900px;overflow:hidden;
  background:#532822;
  display:flex;align-items:center;justify-content:center;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
}

/* ── Outer wrapper (overflow:visible so Kiki can poke out) ── */
.hero{
  position:relative;
  width:900px;
}

/* ── App window ── */
.app{
  width:900px;
  border-radius:16px;
  background:#fff;
  box-shadow:0 40px 100px rgba(0,0,0,0.45),0 0 0 0.5px rgba(0,0,0,0.08);
  overflow:hidden;
}

/* ── macOS chrome ── */
.chrome{
  background:#f6f6f6;
  border-bottom:0.5px solid #e8e0dc;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:7px;
}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5f57;}
.dot-y{background:#febc2e;}
.dot-g{background:#28c840;}

/* ── Greeting header ── */
.hdr{
  background:#fff;
  padding:28px 36px 22px;
  border-bottom:0.5px solid #f0e8e4;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
}
.hdr-left{}
.hdr-eyebrow{
  font-size:11px;font-weight:700;color:#8a6a65;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;
}
.hdr-greeting{
  font-size:32px;font-weight:700;color:#532822;letter-spacing:-.4px;
}
.hdr-sub{
  font-size:13px;color:#8a6a65;margin-top:5px;
}
.hdr-pills{
  display:flex;gap:8px;padding-bottom:4px;
}
.hdr-pill{
  padding:7px 15px;border-radius:50px;border:1.5px solid #e8ddd9;
  font-size:12px;font-weight:600;color:#532822;white-space:nowrap;
  background:#fff;
}
.hdr-pill.active{
  background:#532822;color:#FFF2E9;border-color:#532822;
}

/* ── Stats area ── */
.stats{
  background:#FFF2E9;
  padding:24px 28px 30px;
}
.stats-lbl{
  font-size:10px;font-weight:700;color:#8a6a65;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:14px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.card{
  border-radius:14px;
  padding:22px 24px 20px;
  position:relative;
  overflow:hidden;
}
.card-bg{
  position:absolute;
  right:-22px;bottom:-22px;
  width:96px;height:96px;
  border-radius:50%;
  background:rgba(255,255,255,.16);
}
.card-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:10px;opacity:.75;
  position:relative;
}
.card-num{
  font-size:50px;font-weight:700;line-height:1;margin-bottom:7px;
  position:relative;
}
.card-sub{
  font-size:12px;opacity:.8;position:relative;line-height:1.4;
}

/* ── Kiki character ── */
.kiki{
  position:absolute;
  bottom:-52px;
  right:-72px;
  width:310px;
  filter:drop-shadow(0 12px 36px rgba(0,0,0,.22));
}
</style>
</head>
<body>

<div class="hero">

  <div class="app">

    <!-- macOS chrome -->
    <div class="chrome">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>

    <!-- Greeting header -->
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-eyebrow">Your daily briefing</div>
        <div class="hdr-greeting">Good morning, Sarah.</div>
        <div class="hdr-sub">Here's what's happening today.</div>
      </div>
      <div class="hdr-pills">
        <div class="hdr-pill active">Home</div>
        <div class="hdr-pill">Messages</div>
        <div class="hdr-pill">Projects</div>
        <div class="hdr-pill">Kiki AI</div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stats">
      <div class="stats-lbl">At a glance</div>
      <div class="grid">

        <div class="card" style="background:#E05228;color:#FFF2E9;">
          <div class="card-bg"></div>
          <div class="card-lbl">Open Tasks</div>
          <div class="card-num">5</div>
          <div class="card-sub">2 due today · 1 overdue</div>
        </div>

        <div class="card" style="background:#0084C5;color:#FFF2E9;">
          <div class="card-bg"></div>
          <div class="card-lbl">Unread Messages</div>
          <div class="card-num">3</div>
          <div class="card-sub">James, Rachel + 1 more</div>
        </div>

        <div class="card" style="background:#44A574;color:#FFF2E9;">
          <div class="card-bg"></div>
          <div class="card-lbl">Appointments</div>
          <div class="card-num">2</div>
          <div class="card-sub">Next: Strategy call 2pm</div>
        </div>

        <div class="card" style="background:#FF9299;color:#FFF2E9;">
          <div class="card-bg"></div>
          <div class="card-lbl">New Contacts</div>
          <div class="card-num">4</div>
          <div class="card-sub">Added this week</div>
        </div>

      </div>
    </div>

  </div>
